name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repository name
        id: repo_name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract VITE_API_URL
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env.temp
          VITE_API_URL=$(grep '^VITE_API_URL=' .env.temp | cut -d '=' -f2-)
          echo "VITE_API_URL=$VITE_API_URL" >> $GITHUB_ENV
          rm .env.temp

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}

      - name: Copy deployment files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "nucla"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ env.REPO_NAME }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ENV_FILE,CR_PAT,REPO_NAME
          script: |
            cd nucla
            
            if [ ! -z "$ENV_FILE" ]; then
              echo "$ENV_FILE" > .env
            fi
            
            # Log in to GHCR to pull images
            echo "$CR_PAT" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            export BACKEND_IMAGE=ghcr.io/$REPO_NAME-backend:latest
            export FRONTEND_IMAGE=ghcr.io/$REPO_NAME-frontend:latest
            
            # Pull the new images
            sudo -E docker compose pull
            
            # Start the updated containers
            sudo -E docker compose up -d
            
            # Remove old unused images to save disk space
            sudo docker image prune -f
            
            # Log out
            sudo docker logout ghcr.io
