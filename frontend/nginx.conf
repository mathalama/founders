server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets (Vite assets have unique hashes)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    # Cache other static files (images, icons, robots, etc.)
    location ~* \.(?:webp|png|jpg|jpeg|gif|ico|svg|txt)$ {
        root /usr/share/nginx/html;
        expires 1M;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
        access_log off;
    }
}
